<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NETSCOPE :: NEWS ORRERY</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; }
html { touch-action:manipulation; -webkit-text-size-adjust:100%; }
body {
  background:#000812;
  overflow:hidden;
  font-family:'Share Tech Mono','Courier New',monospace;
  color:#aac4d8;
  /* ⭐ iOS Safari: ページ全体のピンチズームを無効化 (球の zoom は OrbitControls 側で処理) */
  touch-action:none;
  overscroll-behavior:none;
  -webkit-user-select:none;
  user-select:none;
}
/* 詳細パネル内は通常スクロール / 選択を許可 */
#detail-panel { touch-action:pan-y; -webkit-user-select:text; user-select:text; }

/* ─── HUD (老眼配慮) ─── */
#hud {
  position:fixed; top:18px; left:22px; pointer-events:none;
  color:#00e5ff; text-shadow:0 0 12px #00e5ff;
  z-index:10;
}
#hud .title { font-size:24px; font-weight:bold; letter-spacing:6px; margin-bottom:4px; }
#hud .sub   { font-size:13px; color:#006677; letter-spacing:1.5px; }

/* ⭐ App モード (NEWS / SEARCH) */
#app-modes {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:11;
}
.app-mode {
  padding:8px 18px; font-size:12px; letter-spacing:2px;
  color:#ffb84d; border:1px solid #663300; cursor:pointer;
  background:rgba(20,12,0,0.7); transition:all 0.15s;
  font-family:inherit;
}
.app-mode.active {
  color:#ffd166; border-color:#ffd166; text-shadow:0 0 6px #ffd166;
  background:rgba(40,28,0,0.8);
}
.app-mode:hover { color:#ffd166; border-color:#995500; }

/* ⭐ SEARCH バー (App モード = search の時のみ) */
#search-bar {
  position:fixed; top:62px; left:50%; transform:translateX(-50%);
  display:none; gap:6px; z-index:11;
  background:rgba(0,8,18,0.9);
  border:1px solid #00415a;
  padding:8px 12px;
}
#search-bar.active { display:flex; align-items:center; }
#search-input {
  width:min(360px, 60vw); padding:8px 12px;
  background:rgba(0,8,18,0.8); border:1px solid #003855;
  color:#dceaf3; font-family:inherit;
  font-size:14px; letter-spacing:1px;
}
#search-input:focus { outline:none; border-color:#ffd166; }
#search-go {
  padding:8px 18px; font-size:13px; letter-spacing:2px;
  color:#ffd166; border:1px solid #ffd166; background:transparent;
  cursor:pointer; font-family:inherit;
}
#search-go:hover { background:rgba(255,209,102,0.15); }
#search-go:disabled { color:#5a5040; border-color:#5a5040; cursor:not-allowed; }
#search-status { font-size:11px; color:#5a8aa8; letter-spacing:1px; margin-left:8px; }
#search-ai-toggle {
  width:38px; height:38px;
  font-size:20px; line-height:1;
  color:#ffd166; background:rgba(255,209,102,0.06);
  border:1px solid #ffd166; cursor:pointer;
  display:inline-flex !important; align-items:center; justify-content:center;
  padding:0; font-family:inherit;
  flex-shrink:0;
}
#search-ai-toggle:hover { background:rgba(255,209,102,0.18); }
#search-ai-toggle.active { background:rgba(255,209,102,0.22); }
/* ⭐ Gemini エンジン UI: MyMemory 上限到達時の fallback として再有効化 */

#search-ai-settings {
  position:fixed; top:108px; left:50%; transform:translateX(-50%);
  z-index:11;
  width:min(520px, 92vw);
  display:none; flex-direction:column; gap:8px;
  padding:14px 16px;
  background:rgba(0,12,24,0.95);
  border:1px solid #663300;
  font-size:12px; color:#dceaf3;
}
#search-ai-settings.active { display:flex; }
#search-ai-settings .ai-row {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
#search-ai-settings label {
  font-size:11px; color:#ffd166; letter-spacing:1px; min-width:90px;
}
#search-ai-settings select, #search-ai-settings input[type=password] {
  flex:1; min-width:200px;
  padding:8px 10px; font-size:13px;
  background:rgba(0,8,18,0.8); border:1px solid #003855;
  color:#dceaf3; font-family:inherit;
}
#search-ai-settings .ai-save, #search-ai-settings .ai-clear {
  padding:7px 14px; font-size:12px; letter-spacing:1px;
  border:1px solid currentColor; background:transparent;
  cursor:pointer; font-family:inherit;
}
#search-ai-settings .ai-save  { color:#ffd166; }
#search-ai-settings .ai-clear { color:#ff6688; }
#search-ai-settings .ai-save:hover  { background:rgba(255,209,102,0.12); }
#search-ai-settings .ai-clear:hover { background:rgba(255,102,136,0.12); }
#search-ai-settings .ai-note {
  font-size:10.5px; color:#7a93a8; line-height:1.5;
  padding:6px 10px; background:rgba(255,209,102,0.05);
  border-left:2px solid #ffd166;
}

#tabs {
  position:fixed; top:54px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:10;
}
#tabs.search-mode { display:none; }
.tab {
  padding:10px 22px; font-size:14px; letter-spacing:2.5px;
  color:#006677; border:1px solid #003344; cursor:pointer;
  background:rgba(0,8,18,0.7); transition:all 0.15s;
}
.tab.active { color:#00e5ff; border-color:#00e5ff; text-shadow:0 0 6px #00e5ff; }
.tab:hover  { color:#00e5ff; border-color:#005577; }

#nav-prev, #nav-next {
  position:fixed; top:50%; transform:translateY(-50%);
  width:80px; height:140px; cursor:pointer;
  border:1px solid #00415a; background:rgba(0,8,18,0.6);
  color:#00e5ff; font-size:42px;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; z-index:11;
  text-shadow:0 0 10px #00e5ff;
}
#nav-prev { left:22px; }
#nav-next { right:22px; }
#nav-prev:hover, #nav-next:hover {
  background:rgba(0,229,255,0.18);
  border-color:#00e5ff; box-shadow:0 0 22px rgba(0,229,255,0.45);
}

/* ─── REFRESH / AUTO ボタン ─── */
#ctrl-buttons {
  position:fixed; top:18px; right:22px;
  display:flex; gap:8px; z-index:11;
}
.ctrl-btn {
  padding:10px 18px; font-size:13px; letter-spacing:2px;
  color:#006677; border:1px solid #003344; cursor:pointer;
  background:rgba(0,8,18,0.7);
  font-family:'Share Tech Mono','Courier New',monospace;
  transition:all 0.15s;
}
.ctrl-btn:hover { color:#00e5ff; border-color:#005577; }
.ctrl-btn.active {
  color:#00ff9f; border-color:#00ff9f; text-shadow:0 0 6px #00ff9f;
}
.ctrl-btn.spinning {
  color:#00e5ff; border-color:#00e5ff;
  animation:ctrlPulse 0.8s ease-in-out;
}
@keyframes ctrlPulse {
  0%, 100% { box-shadow:0 0 0 rgba(0,229,255,0); }
  50%      { box-shadow:0 0 22px rgba(0,229,255,0.6); }
}

#center-label {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  color:#00e5ff; font-size:32px; font-weight:bold;
  letter-spacing:10px; text-shadow:0 0 16px #00e5ff;
  pointer-events:none; z-index:10;
}
#center-sub {
  position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
  color:#5a7c92; font-size:14px; letter-spacing:3px;
  pointer-events:none; z-index:10;
}

#counter { position:fixed; bottom:14px; left:22px; color:#446677; font-size:12px; letter-spacing:1.5px; z-index:10; }
#updated { position:fixed; bottom:14px; right:22px; color:#446677; font-size:12px; letter-spacing:1.5px; z-index:10; }

/* ─── 設定ギア (iPhone のみ表示) ─── */
#settings-gear {
  position:fixed; top:14px; right:14px;
  width:44px; height:44px; border-radius:50%;
  display:none;                        /* デスクトップは非表示 */
  align-items:center; justify-content:center;
  background:rgba(0,16,32,0.85);
  border:1px solid rgba(0,229,255,0.6);
  color:#00e5ff; font-size:24px;
  cursor:pointer; z-index:13;
  box-shadow:0 0 14px rgba(0,229,255,0.35);
  font-family:'Share Tech Mono',monospace;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
#settings-gear:hover, #settings-gear.active {
  background:rgba(0,40,80,0.92);
  border-color:#00e5ff;
  box-shadow:0 0 22px rgba(0,229,255,0.6);
}
#settings-gear::before {
  content:"⚙"; line-height:1; transform:translateY(-1px);
  text-shadow:0 0 6px rgba(0,229,255,0.9);
}

/* ─── BRIEF panel: 下からふわっと slide-up ─── */
#brief-panel {
  position:fixed; left:50%; bottom:0;
  transform:translateX(-50%) translateY(105%);
  width:min(760px, 94vw);
  background:linear-gradient(180deg, rgba(0,16,32,0.97), rgba(0,8,18,0.98));
  backdrop-filter:blur(6px);
  border:1px solid #00415a;
  border-top:2px solid #00e5ff;
  border-bottom:none;
  padding:28px 30px 34px;
  z-index:25;
  color:#dceaf3;
  font-size:14.5px; line-height:1.9;
  letter-spacing:0.5px;
  box-shadow:0 -10px 50px rgba(0,229,255,0.30);
  max-height:55vh; overflow-y:auto;
  opacity:0; pointer-events:none;
  transition:transform 0.70s cubic-bezier(0.16, 1, 0.3, 1),
             opacity 0.55s ease-out;
}
#brief-panel.open {
  transform:translateX(-50%) translateY(0);
  opacity:1; pointer-events:auto;
}
#brief-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  margin:-28px -30px 14px;
  padding:18px 30px 12px;
  position:sticky; top:-28px; z-index:2;
  background:linear-gradient(180deg, rgba(0,16,32,0.99), rgba(0,12,24,0.96));
  border-bottom:1px dashed #00415a;
}
#brief-panel-title {
  font-size:14px; letter-spacing:5px; color:#00e5ff;
  text-shadow:0 0 8px rgba(0,229,255,0.7);
}
#brief-panel-close {
  cursor:pointer; color:#5a8aa8; font-size:12px;
  letter-spacing:2px; padding:4px 10px;
  border:1px solid #003855; background:rgba(0,8,18,0.5);
  font-family:inherit;
}
#brief-panel-close:hover { color:#00e5ff; border-color:#00e5ff; }
#brief-summary { white-space:pre-wrap; margin-bottom:14px; }
#brief-clusters {
  display:flex; flex-wrap:wrap; gap:7px;
  margin-top:8px; padding-top:14px;
  border-top:1px dashed #003855;
}
.cluster-pill {
  display:inline-block;
  padding:6px 12px;
  font-size:12.5px; letter-spacing:1px;
  color:#9be7c4; background:rgba(0,40,30,0.5);
  border:1px solid #2a6a4e;
  cursor:pointer;
  transition:all 0.15s;
}
.cluster-pill:hover {
  color:#00ff9f; border-color:#00ff9f;
  text-shadow:0 0 6px #00ff9f;
}
.cluster-pill .cluster-count {
  color:#5a8a72; margin-left:6px; font-size:10px;
}

/* iPhone 狭幅 */
@media (max-width: 480px) {
  #brief-panel { padding:22px 20px 28px; font-size:14px; }
}

/* ─── iPhone レイアウト: 右上ギア + 下寄せナビ + 詳細パネル幅圧縮 ─── */
@media (max-width: 600px) {
  #settings-gear { display:flex; }

  /* 上メニューは普段隠れ、 ギアタップで右上から下に popup */
  #tabs, #ctrl-buttons {
    position:fixed; right:14px; left:auto; bottom:auto;
    transform:none;
    display:none; flex-direction:column; gap:6px;
    z-index:14;
    background:rgba(0,8,18,0.92);
    border:1px solid #00415a;
    padding:10px;
    box-shadow:0 0 22px rgba(0,229,255,0.20);
  }
  #tabs.open, #ctrl-buttons.open { display:flex; }
  /* ギア (top:14, 44h) の下に tabs、 その下に ctrl-buttons */
  #tabs        { top:70px; }
  #ctrl-buttons{ top:178px; }
  .tab, .ctrl-btn {
    padding:10px 16px; font-size:13px; letter-spacing:2px;
    min-width:130px; text-align:center;
  }

  /* ナビ矢印: 小さく & 画面下端寄せ */
  #nav-prev, #nav-next {
    width:38px; height:52px; font-size:20px;
    top:auto; bottom:48px;
    transform:none;
    border:1px solid rgba(0,229,255,0.45);
    background:rgba(0,8,18,0.55);
  }
  #nav-prev { left:10px; }
  #nav-next { right:10px; }

  /* GLOBES カウンタは隠す (見にくいだけ) */
  #counter { display:none; }
  #updated { font-size:10px; right:14px; }

  /* HUD タイトル縮める */
  #hud { top:14px; left:14px; }
  #hud .title { font-size:18px; letter-spacing:4px; }
  #hud .sub   { font-size:10px; }

  /* 右からのスライドインパネルを画面内に収める */
  #detail-panel {
    width:min(420px, 92vw);
    padding:24px 22px;
  }

  /* 「観」 BRIEF パネル は上から降ろす (下のナビ矢印を隠さない) */
  #brief-panel {
    top:64px; bottom:auto;
    transform:translateX(-50%) translateY(-110%);
    border-top:none;
    border-bottom:2px solid #00e5ff;
    box-shadow:0 10px 40px rgba(0,229,255,0.30);
    max-height:60vh;
  }
  #brief-panel.open {
    transform:translateX(-50%) translateY(0);
  }
  #detail-keyword { font-size:30px; margin:30px 0 8px; }
  #detail-meta-top { font-size:13px; margin-bottom:20px; }
  .article-title { font-size:16px; }
  .article-summary { font-size:13px; }
  .article-meta { font-size:11px; }
}
#loading {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#00e5ff; font-size:18px; letter-spacing:4px; text-shadow:0 0 12px #00e5ff;
  z-index:10;
}

/* ─── 攻殻機動隊風背景 ─── */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:5;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,255,0.030) 0px, rgba(0,255,255,0.030) 1px,
    transparent 1px, transparent 3px
  );
  mix-blend-mode:screen;
}
#scan-beam {
  position:fixed; top:0; left:0; right:0; height:140px;
  pointer-events:none; z-index:6;
  background:linear-gradient(180deg, transparent 0%, rgba(0,229,255,0.10) 50%, transparent 100%);
  animation:scanBeam 8s linear infinite;
}
@keyframes scanBeam {
  0%   { transform:translateY(-140px); }
  100% { transform:translateY(100vh); }
}
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:4;
  background:radial-gradient(ellipse at center, transparent 35%, rgba(0,8,18,0.88) 100%);
}
#data-stream { position:fixed; inset:0; pointer-events:none; z-index:3; overflow:hidden; }
.data-char {
  position:absolute; color:rgba(0,229,255,0.20);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  letter-spacing:1.5px; white-space:pre; line-height:1.6;
  animation:dataFall linear infinite;
  text-shadow:0 0 6px rgba(0,229,255,0.5);
}
@keyframes dataFall {
  0%   { transform:translateY(-30px); opacity:0; }
  10%  { opacity:0.85; }
  90%  { opacity:0.85; }
  100% { transform:translateY(100vh); opacity:0; }
}
#corner-tl, #corner-tr, #corner-bl, #corner-br {
  position:fixed; width:60px; height:60px; pointer-events:none; z-index:7;
  border:1px solid rgba(0,229,255,0.45);
}
#corner-tl { top:8px; left:8px;     border-right:none; border-bottom:none; }
#corner-tr { top:8px; right:8px;    border-left:none;  border-bottom:none; }
#corner-bl { bottom:8px; left:8px;  border-right:none; border-top:none; }
#corner-br { bottom:8px; right:8px; border-left:none;  border-top:none; }

/* ─── 右からのスライドインパネル ─── */
#detail-panel {
  position:fixed; top:0; right:0; height:100vh;
  width:min(560px, 92vw);
  background:linear-gradient(160deg, rgba(0,16,32,0.97), rgba(0,32,64,0.97));
  backdrop-filter:blur(10px);
  border-left:2px solid #00e5ff;
  box-shadow:-4px 0 32px rgba(0,229,255,0.25);
  transform:translateX(100%);
  transition:transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
  padding:36px 32px;
  z-index:30;
  overflow-y:auto;
  color:#dceaf3;
}
#detail-panel.active { transform:translateX(0); }
#detail-close {
  position:sticky; top:0; float:right;
  margin:-20px -18px 0 0;
  color:#00e5ff; font-size:15px; font-weight:bold; letter-spacing:2px;
  cursor:pointer; padding:10px 16px; border:1px solid #00e5ff;
  background:rgba(0,12,24,0.92);
  z-index:5;
}
#detail-keyword {
  font-size:40px; font-weight:bold; color:#00e5ff;
  text-shadow:0 0 14px rgba(0,229,255,0.6);
  letter-spacing:3px; margin:36px 0 10px;
}
#detail-meta-top {
  font-size:15px; color:#5a7c92; letter-spacing:1.5px; margin-bottom:28px;
}
.article-card {
  border:1px solid #003855; background:rgba(0,30,50,0.5);
  padding:18px 20px; margin-bottom:16px;
  transition:all 0.15s;
}
.article-card:hover { border-color:#00e5ff; background:rgba(0,40,70,0.7); }
.article-title {
  font-size:19px; line-height:1.55; color:#cfe7f5;
  margin-bottom:6px; font-weight:bold;
}
.article-title-orig {
  font-size:12px; line-height:1.45; color:#5c7c92;
  margin-bottom:10px; font-style:italic;
  word-break:break-word;
}
.article-summary {
  font-size:15px; line-height:1.7; color:#9ab4c8;
  margin-bottom:12px;
}
.article-meta { font-size:13px; color:#557289; letter-spacing:1px; }
.article-meta span { display:inline-block; margin-right:14px; }
.article-link {
  display:inline-block; margin-top:8px;
  font-size:14px; color:#00ff9f; text-decoration:none;
  border-bottom:1px solid transparent; letter-spacing:1px;
}
.article-link:hover { border-bottom-color:#00ff9f; }
</style>
</head>
<body>

<div id="data-stream"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="scan-beam"></div>
<div id="corner-tl"></div><div id="corner-tr"></div>
<div id="corner-bl"></div><div id="corner-br"></div>

<div id="hud">
  <div class="title">NETSCOPE</div>
  <div class="sub">REVOLVER MODE :: ◀ ▶ ROTATE :: TAP KEYWORD</div>
</div>

<!-- ⭐ App モード (NEWS / SEARCH) — tabs の上 -->
<div id="app-modes">
  <div class="app-mode active" data-app="news">📰 NEWS</div>
  <div class="app-mode"        data-app="search">🔍 SEARCH</div>
</div>

<!-- CATEGORY / SOURCE タブは撤廃 (カテゴリ表示のみ) -->
<div id="tabs" style="display:none;">
  <div class="tab active" data-mode="category">CATEGORY</div>
</div>

<!-- ⭐ SEARCH モード時のみ表示 -->
<div id="search-bar">
  <input id="search-input" type="search" placeholder="キーワードを入れて GO" autocomplete="off">
  <button id="search-go">GO</button>
  <button id="search-ai-toggle" title="AI 翻訳エンジン設定">⚙</button>
  <div id="search-status"></div>
</div>
<!-- AI 翻訳設定 (toggle で開閉) -->
<div id="search-ai-settings">
  <div class="ai-row">
    <label>翻訳エンジン</label>
    <select id="search-engine">
      <option value="native">端末内 (Chrome 138+、 無料・無制限・オフライン)</option>
      <option value="gemini">Gemini (BYOK、 高品質 + 速い)</option>
      <option value="mymemory">MyMemory (無料、 1000語/日 上限)</option>
    </select>
  </div>
  <div class="ai-row">
    <label>Gemini API キー (Gemini 選択時のみ使用)</label>
    <input type="password" id="search-gemini-key" placeholder="AIza... (aistudio.google.com で発行)" autocomplete="off">
  </div>
  <div class="ai-row">
    <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style="color:#00ff9f;font-size:11px;">無料キー取得 →</a>
    <button id="search-ai-save" class="ai-save">保存</button>
    <button id="search-ai-clear" class="ai-clear">キー削除</button>
  </div>
  <div class="ai-note">⚠ キーはこのブラウザの localStorage のみ。 NITS と共有 (同一 origin)。 父と共有する場合は文字列を渡してペースト</div>
</div>

<div id="nav-prev">◀</div>
<div id="nav-next">▶</div>

// ⭐ iOS Safari のピンチ・ダブルタップズームを完全に殺す (3D 球の zoom は OrbitControls 側)
['gesturestart','gesturechange','gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), { passive:false })
);
// 2 本指タッチをページ操作と認識させない
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive:false });
// ダブルタップズーム防止
let __lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - __lastTap < 300) e.preventDefault();
  __lastTap = now;
}, { passive:false });

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2          } from 'three/addons/lines/Line2.js';
import { LineGeometry   } from 'three/addons/lines/LineGeometry.js';
import { LineMaterial   } from 'three/addons/lines/LineMaterial.js';

// ── data-stream (最初 25 秒は賑やか → ゆっくり静かに / 同時表示数に上限) ──
const DATA_CHARS = '電脳網闇情報攻殻機動局意識データ零壱拾百千万億∞解析観測流変論調';
const DIGITS = '0123456789';
const STREAM_MAX_ACTIVE = 18;      // 同時表示数の上限
const STREAM_INTRO_MS   = 25000;   // 最初の 25 秒間は賑やか
const STREAM_INTERVAL_INTRO = 700; // intro 中の生成間隔 (ms)
const STREAM_INTERVAL_CALM  = 2600; // intro 後の生成間隔 (ms)
const streamRoot = document.getElementById('data-stream');
const streamStartedAt = performance.now();

function spawnDataChar() {
  if (streamRoot.childElementCount >= STREAM_MAX_ACTIVE) return;
  const el = document.createElement('div');
  el.className = 'data-char';
  const len = 6 + Math.floor(Math.random()*7);
  let s = '';
  for (let i = 0; i < len; i++) {
    const pool = Math.random() < 0.5 ? DATA_CHARS : DIGITS;
    s += pool[Math.floor(Math.random()*pool.length)] + '\n';
  }
  el.textContent = s;
  el.style.left = (Math.random() * 100) + 'vw';
  el.style.animationDuration = (10 + Math.random()*14) + 's';
  streamRoot.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
function scheduleNextStream() {
  const elapsed = performance.now() - streamStartedAt;
  // intro → calm へ線形で interval を伸ばす (25s → 26s で fade-out)
  let interval;
  if (elapsed < STREAM_INTRO_MS) {
    interval = STREAM_INTERVAL_INTRO;
  } else if (elapsed < STREAM_INTRO_MS + 1000) {
    const t = (elapsed - STREAM_INTRO_MS) / 1000;
    interval = STREAM_INTERVAL_INTRO + (STREAM_INTERVAL_CALM - STREAM_INTERVAL_INTRO) * t;
  } else {
    interval = STREAM_INTERVAL_CALM;
  }
  spawnDataChar();
  setTimeout(scheduleNextStream, interval + Math.random()*200);
}
// 立ち上がりだけ短い間隔で 8 個まとめて出す (上限あるので暴走しない)
for (let i = 0; i < 8; i++) setTimeout(spawnDataChar, i * 220);
setTimeout(scheduleNextStream, 500);

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000812);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();

// ⭐ カメラ固定 (画面全体は回さない)
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 8000);
camera.position.set(0, 80, 850);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance   = 550;
controls.maxDistance   = 2600;
controls.enablePan     = false;
controls.enableRotate  = false;   // ⭐ 画面全体の回転を無効化 (NewsGlobe スタイル: 球だけ回す)
controls.enableZoom    = true;
controls.target.set(0, 0, 0);

// ── 背景: グリッドフロア ──
{
  const grid = new THREE.GridHelper(3000, 70, 0x004466, 0x002233);
  grid.position.y = -350;
  grid.material.transparent = true; grid.material.opacity = 0.4;
  scene.add(grid);
  const grid2 = new THREE.GridHelper(3000, 14, 0x00aacc, 0x005577);
  grid2.position.y = -349;
  grid2.material.transparent = true; grid2.material.opacity = 0.25;
  scene.add(grid2);
}

// ── 背景パーティクル ──
{
  const n = 1000, pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const ph = Math.random()*Math.PI*2, th = Math.random()*Math.PI;
    const r  = 1100 + Math.random()*1800;
    pos[i*3]   = r*Math.sin(th)*Math.cos(ph);
    pos[i*3+1] = r*Math.cos(th);
    pos[i*3+2] = r*Math.sin(th)*Math.sin(ph);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x003355, size: 1.4 })));
}

// ── orrery 親グループ ──
const orreryGroup = new THREE.Group();
scene.add(orreryGroup);

// ─────────── REVOLVER 弾倉スロット ───────────
//
// SLOT 0 = 銃身 (main、 中央、 大きい)、 1..N-1 = 弾倉 (周囲、 小さい)
// 各 globe は 1 つのスロットを占有。 ◀ ▶ で全 globe が同時に隣のスロットへスライド。
// SLOT 0 が常に主役表示。
//
const N_GLOBES_MAX = 9;
const GLOBE_RADIUS = 170;      // ⭐ export.py の GLOBE_RADIUS と完全一致必須
// iPhone は画面狭いので主球に集中させる (衛星を半分以下に)
const _IS_MOBILE = innerWidth < 600;
const MAIN_SCALE = 2.6;
const SAT_SCALE  = _IS_MOBILE ? 0.18 : 0.32;
const SAT_RING_RADIUS = _IS_MOBILE ? 600 : 720;
const SAT_RING_Z      = -120;
const SAT_RING_Y_SCALE = 0.65; // 縦圧縮 (楕円リング)

// ⭐ SOURCE モード用: ソース名 → 色 のハッシュ割当
const SOURCE_COLOR_PALETTE = [
  '#00e5ff', '#00ff9f', '#ff4136', '#ffdc00',
  '#b88aff', '#ff851b', '#ff7eb9', '#7fdbff',
  '#9be7c4', '#e0d2ff', '#ff9b9b', '#aaffaa',
  '#80c8ff', '#ffb8d4', '#a8e6cf', '#ffc6a0',
];
function colorForSource(name) {
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) {
    h = ((h * 31) + name.charCodeAt(i)) | 0;
  }
  const idx = Math.abs(h) % SOURCE_COLOR_PALETTE.length;
  return SOURCE_COLOR_PALETTE[idx];
}

function buildSlots(count) {
  // count: 全 globe 数。 slot 0 = main、 残り = 衛星
  const slots = [];
  slots.push({ pos: new THREE.Vector3(0, 0, 0), scale: MAIN_SCALE });
  const n = count - 1;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2; // 12 時から時計回り
    slots.push({
      pos: new THREE.Vector3(
        Math.cos(angle) * SAT_RING_RADIUS,
        Math.sin(angle) * SAT_RING_RADIUS * SAT_RING_Y_SCALE,
        SAT_RING_Z,
      ),
      scale: SAT_SCALE,
    });
  }
  return slots;
}

// ── Sprite (キーワード) ファクトリ ──
//   ratio (0.0-1.0) で fontSize / 色 intensity / alpha / glow を全て連動。
//   関連強 (ratio=1) → 大・濃・くっきり、 関連弱 (ratio=0) → 小・薄・控えめ。
function makeKeywordSprite(node, fontSize, ratio, colorHex) {
  const text  = node.text;
  // ⭐ キーワード自体が日本語表記 (ひらがな/カタカナ/漢字) なら EN バッジは付けない
  // (日本語表記時点で 「海外発」 シグナルは無意味、 視覚的に混乱を招くため)
  const isJapaneseText = /[ぁ-ゟ゠-ヿ一-鿿]/.test(text);
  const isEn  = !isJapaneseText && (node.en_ratio || 0) >= 0.3;
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  const fs     = Math.round(Math.max(14, Math.min(70, fontSize)));
  const bfs    = Math.max(9, Math.round(fs * 0.42));
  ctx.font     = `bold ${fs}px "Share Tech Mono", "Courier New", monospace`;
  const tw     = ctx.measureText(text).width;
  ctx.font     = `bold ${bfs}px "Share Tech Mono", "Courier New", monospace`;
  const bw     = isEn ? ctx.measureText('EN').width + 10 : 0;
  canvas.width  = Math.ceil(tw) + 28 + bw;
  canvas.height = fs + 18;
  ctx.font      = `bold ${fs}px "Share Tech Mono", "Courier New", monospace`;
  const hex = colorHex.toString(16).padStart(6, '0');
  const r = parseInt(hex.slice(0,2), 16);
  const g = parseInt(hex.slice(2,4), 16);
  const b = parseInt(hex.slice(4,6), 16);
  const intensity = 0.30 + ratio * 0.70;
  const alpha     = 0.42 + ratio * 0.58;
  const color = `rgba(${Math.round(r*intensity)},${Math.round(g*intensity)},${Math.round(b*intensity)},${alpha})`;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 8 + ratio * 16;
  ctx.fillStyle   = color;
  ctx.fillText(text, 14, fs + 4);
  ctx.shadowBlur  = 4 + ratio * 6;
  ctx.fillText(text, 14, fs + 4);
  // EN バッジ (海外ソース由来)
  if (isEn) {
    ctx.font = `bold ${bfs}px "Share Tech Mono", "Courier New", monospace`;
    const badgeColor = `rgba(255,200,80,${Math.min(1, alpha + 0.15)})`;
    ctx.shadowColor = 'rgba(255,200,80,0.85)';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = badgeColor;
    const bx = 14 + tw + 6;
    const by = fs + 4 - Math.round(fs * 0.18);
    ctx.fillText('EN', bx, by);
    ctx.shadowBlur = 0;
  }
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(canvas.width * 0.30, canvas.height * 0.30, 1);
  return sp;
}

// ⭐ BRIEF ── 球の中央 (内側) に浮かぶ octagonal core sprite。
//   - depth-test 有効 → 表面の keyword sprite やワイヤフレーム線で隠れる ("slime の核" 感)
//   - 各 globe に 1 個ずつ child として配置、 main 化されたとき visible に
function makeBriefSprite(colorHex) {
  const W = 220, H = 180;
  const canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const hex = colorHex.toString(16).padStart(6, '0');
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  const rgba = (a) => `rgba(${r},${g},${b},${a})`;

  // 八角形パス
  const inset = 0.20;
  const drawOctagon = () => {
    ctx.beginPath();
    ctx.moveTo(W * inset, 0);
    ctx.lineTo(W * (1 - inset), 0);
    ctx.lineTo(W, H * 0.5);
    ctx.lineTo(W * (1 - inset), H);
    ctx.lineTo(W * inset, H);
    ctx.lineTo(0, H * 0.5);
    ctx.closePath();
  };

  // 中央放射 fill
  const grad = ctx.createRadialGradient(W / 2, H / 2, 8, W / 2, H / 2, W * 0.62);
  grad.addColorStop(0.0, rgba(0.28));
  grad.addColorStop(0.5, rgba(0.10));
  grad.addColorStop(1.0, 'rgba(0,8,18,0.45)');
  drawOctagon();
  ctx.fillStyle = grad; ctx.fill();

  // 主枠 (太め glow)
  drawOctagon();
  ctx.shadowColor = rgba(0.95); ctx.shadowBlur = 22;
  ctx.strokeStyle = rgba(0.92); ctx.lineWidth = 2.2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 内側薄枠 (二重線)
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(0.90, 0.80);
  ctx.translate(-W / 2, -H / 2);
  drawOctagon();
  ctx.strokeStyle = rgba(0.32); ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // 主漢字 "観"
  ctx.shadowColor = rgba(0.9); ctx.shadowBlur = 16;
  ctx.fillStyle = rgba(1.0);
  ctx.font = 'bold 78px "Hiragino Mincho ProN", "YuMincho", "Share Tech Mono", serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('観', W / 2, H / 2 - 6);

  // サブ "SCAN"
  ctx.shadowBlur = 6;
  ctx.font = 'bold 14px "Share Tech Mono", monospace';
  ctx.fillStyle = rgba(0.7);
  ctx.fillText('SCAN', W / 2, H / 2 + 46);
  ctx.shadowBlur = 0;

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    // depthTest: true がデフォルト → 球表面の sprite やワイヤフレーム線で隠れる
  });
  const sp = new THREE.Sprite(mat);
  // 球内に控えめ存在 (90x73 → 58x47、 iPhone でも邪魔にならないサイズ)
  sp.scale.set(58, 47, 1);
  sp.userData = { isBrief: true };
  return sp;
}

function makeCategoryLabel(text, colorHex) {
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  const fs     = 80;
  ctx.font     = `bold ${fs}px "Orbitron", "Share Tech Mono", monospace`;
  const tw     = ctx.measureText(text).width;
  canvas.width  = Math.ceil(tw) + 80;
  canvas.height = fs + 40;
  ctx.font      = `bold ${fs}px "Orbitron", "Share Tech Mono", monospace`;
  const hex = colorHex.toString(16).padStart(6, '0');
  const color = '#' + hex;
  ctx.shadowColor = color;
  ctx.shadowBlur  = 36;
  ctx.fillStyle   = color;
  ctx.fillText(text, 40, fs + 14);
  ctx.shadowBlur  = 16;
  ctx.fillText(text, 40, fs + 14);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(canvas.width * 0.55, canvas.height * 0.55, 1);
  return sp;
}

// ── Globe builder ──
function buildGlobe(globeData) {
  const group = new THREE.Group();
  group.userData = { globeData };

  const radius = GLOBE_RADIUS;   // ⭐ export.py と一致
  const colorHex = parseInt(globeData.color.replace('#', ''), 16);

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 32, 32),
    new THREE.MeshBasicMaterial({ color: colorHex, wireframe: true, transparent: true, opacity: 0.13 })
  );
  group.add(sphere);

  const eq = new THREE.Mesh(
    new THREE.TorusGeometry(radius, 0.5, 2, 100),
    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.5 })
  );
  group.add(eq);
  const mer = new THREE.Mesh(
    new THREE.TorusGeometry(radius, 0.35, 2, 100),
    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.28 })
  );
  mer.rotation.x = Math.PI / 2;
  group.add(mer);

  // キーワードノード (関連度連動: 強→大濃、 弱→小薄)
  const maxCount = globeData.nodes[0]?.count || 1;
  const minCount = globeData.nodes[globeData.nodes.length - 1]?.count || 1;
  const range = Math.max(1, maxCount - minCount);
  const posMap = {};
  globeData.nodes.forEach(node => {
    // 上位/下位の差を hyperbolic 強調
    const ratio = Math.pow((node.count - minCount) / range, 0.7);
    // ⭐ fontSize 範囲を狭めて重なり回避 (32-100 → 18-56)
    const fs = 18 + ratio * 38;
    const sprite = makeKeywordSprite(node, fs, ratio, colorHex);
    const pos = node.pos || [0, 0, 0];
    sprite.position.set(pos[0], pos[1], pos[2]);
    sprite.userData = { keyword: node, globeId: globeData.id };
    group.add(sprite);
    posMap[node.text] = pos;
  });

  // エッジ
  const resVec = new THREE.Vector2(innerWidth, innerHeight);
  const edges = globeData.edges || [];
  if (edges.length) {
    const maxW = Math.max(...edges.map(e => e.weight), 1);
    edges.forEach(e => {
      const pA = posMap[e.a], pB = posMap[e.b];
      if (!pA || !pB) return;
      const ratio = e.weight / maxW;
      // ⭐ 線太さに上限。 細めで揃える (近接度はノード距離で表現される)
      const linewidth = 0.4 + ratio * 1.0;   // 0.4 〜 1.4
      const opacity = 0.10 + ratio * 0.40;
      const intensity = 0.5 + ratio * 0.5;
      const color = new THREE.Color(
        ((colorHex >> 16) & 0xff) / 255 * intensity,
        ((colorHex >>  8) & 0xff) / 255 * intensity,
        ( colorHex        & 0xff) / 255 * intensity
      );
      const geo = new LineGeometry();
      geo.setPositions([pA[0], pA[1], pA[2], pB[0], pB[1], pB[2]]);
      const mat = new LineMaterial({
        color, linewidth, transparent: true, opacity,
        depthWrite: false, resolution: resVec,
      });
      group.add(new Line2(geo, mat));
    });
  }

  // カテゴリラベル (大きく)
  const label = makeCategoryLabel(globeData.label, colorHex);
  label.position.set(0, radius + 60, 0);
  group.add(label);
  group.userData.label = label;

  // BRIEF core sprite (球の中央内側に浮かぶ)
  const brief = makeBriefSprite(colorHex);
  brief.position.set(0, 0, 0);
  brief.visible = false;             // main globe & summary 存在時のみ表示
  brief.userData.globeData = globeData;
  group.add(brief);
  group.userData.brief = brief;

  return group;
}

// ─────────── REVOLVER 制御 ───────────
let globesData = [];
let globesList = [];           // Three.js Group の配列
let slots = [];                // 現在のスロット定義
let slotAssignment = [];       // globesList[i] が現在いる slot index
let animTime = 0, animDur = 0.5, animating = false;
let animFromPos = [], animFromScale = [], animToPos = [], animToScale = [];
let pendingDirection = 0;       // アニメ完了後に次の rotate を消化

function disposeGroup(group) {
  if (!group) return;
  group.traverse?.(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      if (o.material.map) o.material.map.dispose();
      if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
      else o.material.dispose();
    }
  });
  if (group.parent) group.parent.remove(group);
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function layoutRevolver() {
  globesList.forEach(disposeGroup);
  globesList = [];

  if (!globesData.length) return;

  slots = buildSlots(globesData.length);

  globesData.forEach((g, i) => {
    const grp = buildGlobe(g);
    grp.userData.staticIndex = i;
    grp.position.copy(slots[i].pos);
    grp.scale.setScalar(slots[i].scale);
    orreryGroup.add(grp);
    globesList.push(grp);
  });
  // 最初は globe[i] が slot[i] にいる → main = globe[0]
  slotAssignment = globesList.map((_, i) => i);
  animating = false;
  pendingDirection = 0;
  updateCenterLabel();
}

function getMainGlobeData() {
  // slot 0 にいる globe = main
  for (let i = 0; i < globesList.length; i++) {
    if (slotAssignment[i] === 0) return globesData[i];
  }
  return null;
}

function updateCenterLabel() {
  const g = getMainGlobeData();
  if (!g) return;
  document.getElementById('center-label').textContent = g.label;
  document.getElementById('center-sub').textContent =
    `${g.node_count} KEYWORDS  /  ${g.total_articles} ARTICLES`;
  // FLOW 中は全ラベルを 出しっぱなし (main 切替の点滅を防ぐ)
  // 非 FLOW (リボルバー) は main だけ HUD と重複するので非表示
  globesList.forEach((grp, i) => {
    if (!grp.userData.label) return;
    if (autoFlow) {
      grp.userData.label.material.opacity = 0.85;
    } else {
      grp.userData.label.material.opacity = (slotAssignment[i] === 0) ? 0.0 : 0.85;
    }
  });
  updateBrief(g);
}

// ── BRIEF パネル ──
let lastBriefGlobeId = null;
let briefFadeTimer = null;
function updateBrief(g) {
  const summaryEl  = document.getElementById('brief-summary');
  const clustersEl = document.getElementById('brief-clusters');
  const titleEl    = document.getElementById('brief-panel-title');
  const panel      = document.getElementById('brief-panel');

  const hasSummary  = !!(g.summary && g.summary.trim());
  const hasClusters = Array.isArray(g.clusters) && g.clusters.length > 0;

  // 球内 BRIEF sprite の表示制御 (FLOW 時は animate 側で smooth 管理)
  if (!autoFlow) {
    globesList.forEach((grp, i) => {
      const isMain = (slotAssignment[i] === 0);
      const data   = grp.userData?.globeData;
      const has    = !!(data && (data.summary || (data.clusters && data.clusters.length)));
      if (grp.userData.brief) grp.userData.brief.visible = (isMain && has);
    });
  }

  // ── 実際のコンテンツ差し替え ──
  const applySwap = () => {
    if (titleEl) titleEl.textContent = `${g.label || '─'} ─ 観 / SCAN`;
    if (!hasSummary && !hasClusters) {
      summaryEl.innerHTML =
        '<span style="color:#5a7c92;font-style:italic;line-height:1.7;">' +
        '─ NO SCAN AVAILABLE ─<br>' +
        'このカテゴリは今回 要約が生成できませんでした。<br>' +
        '次の自動更新で復活する見込みです。' +
        '</span>';
      summaryEl.style.display = 'block';
      clustersEl.innerHTML = '';
      return;
    }
    summaryEl.textContent = hasSummary ? g.summary : '';
    summaryEl.style.display = hasSummary ? 'block' : 'none';
    clustersEl.innerHTML = '';
    if (hasClusters) {
      const kwCount = {};
      (g.nodes || []).forEach(n => { kwCount[n.text] = n.count || 0; });
      g.clusters.forEach(c => {
        const total = (c.keywords || []).reduce((s, k) => s + (kwCount[k] || 0), 0);
        const pill = document.createElement('span');
        pill.className = 'cluster-pill';
        pill.innerHTML = `${c.name}<span class="cluster-count">${total}</span>`;
        pill.addEventListener('click', () => focusCluster(c, g));
        clustersEl.appendChild(pill);
      });
    }
  };

  // パネル開いていて、 main 切替の時のみ「下に引っ込めて、 入替後 また出す」
  const isOpen = panel.classList.contains('open');
  const idChanged = lastBriefGlobeId !== null && lastBriefGlobeId !== g.id;
  lastBriefGlobeId = g.id;

  if (isOpen && idChanged) {
    if (briefFadeTimer) clearTimeout(briefFadeTimer);
    // ① パネルを 下へ slide down (0.70s transition)
    panel.classList.remove('open');
    briefFadeTimer = setTimeout(() => {
      // ② パネル消えてる間に content 差し替え
      applySwap();
      // ③ 少し間を置いてから再 slide up
      setTimeout(() => {
        panel.classList.add('open');
        briefFadeTimer = null;
      }, 120);
    }, 720);
  } else {
    if (briefFadeTimer) { clearTimeout(briefFadeTimer); briefFadeTimer = null; }
    applySwap();
  }
}

function focusCluster(cluster, globeData) {
  // クラスタの代表キーワード記事を集約して詳細パネルに出す
  const kws = cluster.keywords || [];
  const nodes = (globeData.nodes || []).filter(n => kws.includes(n.text));
  if (!nodes.length) return;
  // 仮想キーワード: name 表示で記事を統合
  const articles = [];
  const seen = new Set();
  nodes.forEach(n => (n.articles || []).forEach(a => {
    const k = a.url || a.title;
    if (k && !seen.has(k)) { seen.add(k); articles.push(a); }
  }));
  const totalCount = nodes.reduce((s, n) => s + (n.count || 0), 0);
  showKeywordDetail({
    text: cluster.name,
    count: totalCount,
    articles: articles.slice(0, 30),
  });
}

function rotateRevolver(direction) {
  if (animating) {
    pendingDirection = direction; // 1 個だけ予約 (連打対策)
    return;
  }
  if (globesList.length < 2) return;

  const N = globesList.length;
  // 全 globe の slot を direction だけシフト
  const newAssignment = slotAssignment.map(s => ((s + direction) % N + N) % N);

  animFromPos = []; animFromScale = []; animToPos = []; animToScale = [];
  globesList.forEach((g, i) => {
    animFromPos.push(g.position.clone());
    animFromScale.push(g.scale.x);
    const newSlot = newAssignment[i];
    animToPos.push(slots[newSlot].pos.clone());
    animToScale.push(slots[newSlot].scale);
  });

  slotAssignment = newAssignment;
  animTime = 0;
  animating = true;
  // ラベル可視性は遷移後すぐ更新したい
  setTimeout(updateCenterLabel, animDur * 1000 * 0.5);
}

function updateRevolverAnim(dt) {
  if (!animating) return;
  animTime += dt;
  const t = Math.min(1, animTime / animDur);
  const eased = easeOutCubic(t);
  globesList.forEach((g, i) => {
    g.position.lerpVectors(animFromPos[i], animToPos[i], eased);
    const s = animFromScale[i] + (animToScale[i] - animFromScale[i]) * eased;
    g.scale.setScalar(s);
  });
  if (t >= 1) {
    animating = false;
    if (pendingDirection !== 0) {
      const d = pendingDirection; pendingDirection = 0;
      rotateRevolver(d);
    }
  }
}

// ── データ読み込み ──
let currentData = null;
let currentMode = 'category';

async function loadData() {
  try {
    const res = await fetch('./data/orrery.json?_=' + Date.now());
    if (!res.ok) throw new Error('orrery.json not found');
    currentData = await res.json();
    rebuildGlobes();
  } catch (e) {
    console.error(e);
    document.getElementById('loading').textContent = 'NO DATA :: refresh が必要です';
  }
}

function rebuildGlobes() {
  if (!currentData) return;
  let globes = currentData.globes;
  if (currentMode === 'source') {
    const bySource = {};
    currentData.globes.forEach(g => {
      g.nodes.forEach(node => {
        node.articles.forEach(a => {
          const key = a.source_name || 'unknown';
          if (!bySource[key]) bySource[key] = { keywordCount: {}, articleSet: new Set() };
          if (!bySource[key].keywordCount[node.text]) {
            bySource[key].keywordCount[node.text] = { count: 0, articles: [] };
          }
          bySource[key].keywordCount[node.text].count += node.count;
          bySource[key].keywordCount[node.text].articles.push(a);
          bySource[key].articleSet.add(a.url);
        });
      });
    });
    globes = Object.entries(bySource).map(([id, v]) => {
      const entries = Object.entries(v.keywordCount)
        .sort((a, b) => b[1].count - a[1].count)
        .slice(0, 60);
      const nodes = entries.map(([text, info]) => ({
        text, count: info.count, articles: info.articles.slice(0, 8),
      }));
      const n = nodes.length;
      nodes.forEach((node, i) => {
        const phi   = Math.acos(1 - 2*(i+0.5)/n);
        const theta = Math.PI*(1+Math.sqrt(5))*i;
        node.pos = [
          GLOBE_RADIUS*Math.sin(phi)*Math.cos(theta),
          GLOBE_RADIUS*Math.cos(phi),
          GLOBE_RADIUS*Math.sin(phi)*Math.sin(theta),
        ];
      });
      // ⭐ ソース名から固有色を割当
      return {
        id, label: id.toUpperCase(), color: colorForSource(id),
        node_count: nodes.length, total_articles: v.articleSet.size,
        nodes, edges: [],
      };
    }).filter(g => g.node_count > 0);
  }
  globesData = globes;
  layoutRevolver();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('updated').textContent = 'GENERATED: ' + (currentData.generated_at || '─');
  document.getElementById('counter').textContent =
    `GLOBES: ${globes.length}  /  KEYWORDS: ${currentData.total_keywords}  /  ARTICLES: ${currentData.total_articles}`;
}

const AUTO_INTERVAL_MS = 30000;
let autoTimer = null;
const btnAuto = document.getElementById('btn-auto');
function setAuto(on) {
  if (on) {
    setFlow(false);                            // mutex
    btnAuto.classList.add('active');
    btnAuto.textContent = '■ AUTO';
    autoTimer = setInterval(() => rotateRevolver(+1), AUTO_INTERVAL_MS);
  } else {
    btnAuto.classList.remove('active');
    btnAuto.textContent = '▶ AUTO';
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  }
}
btnAuto.addEventListener('click', () => setAuto(autoTimer === null));

// ── FLOW ボタン (メリーゴーランド式: 円周上を等速で滑らかに自転) ──
const FLOW_PERIOD_SEC = 540;                   // 一周 540 秒 (流し見ペース、 9 分で 1 周)
let autoFlow = false;
let flowAngle = 0;
let flowMainIdx = -1;
let savedSlotAssignment = null;                // FLOW 入る前の状態を保存
const btnFlow = document.getElementById('btn-flow');
function setFlow(on) {
  if (on) setAuto(false);                      // mutex
  if (on && !autoFlow) {
    // FLOW 入る瞬間に元の slotAssignment を保存
    savedSlotAssignment = slotAssignment.slice();
  }
  autoFlow = !!on;
  btnFlow.classList.toggle('active', autoFlow);
  btnFlow.textContent = autoFlow ? '■ FLOW' : '▶ FLOW';
  if (autoFlow) {
    // FLOW 開始時: 全 globe のラベルを 出しっぱなしに
    globesList.forEach(grp => {
      if (grp.userData.label) grp.userData.label.material.opacity = 0.85;
    });
  }
  if (!autoFlow) {
    // 保存していた slotAssignment を復元 → スナップで戻す
    if (savedSlotAssignment) {
      slotAssignment = savedSlotAssignment.slice();
      savedSlotAssignment = null;
    } else {
      slotAssignment = globesList.map((_, i) => i);
    }
    if (slots.length && globesList.length) {
      globesList.forEach((g, i) => {
        const slot = slots[slotAssignment[i]];
        if (!slot) return;
        g.position.copy(slot.pos);
        g.scale.setScalar(slot.scale);
      });
    }
    flowMainIdx = -1;
    updateCenterLabel();
  }
}
btnFlow.addEventListener('click', () => setFlow(!autoFlow));

// ─────────── ポインタ state machine ───────────
//
// Modes:
//   'tap-candidate'    : pointerdown 直後、 まだ動きが少ない
//   'main-rotate'      : 主役 globe をドラッグして回転中
//   'background-swipe' : 主役以外の場所でドラッグ → リボルバー回転候補
//
let pState = null;

function findMainGlobe() {
  for (let i = 0; i < globesList.length; i++) {
    if (slotAssignment[i] === 0) return globesList[i];
  }
  return null;
}

function isHitOnMain(hit, main) {
  if (!hit || !main) return false;
  if (hit.type === 'globe' && hit.group === main) return true;
  // キーワードは main の子なら main 扱い
  if (hit.type === 'keyword') {
    let found = false;
    main.traverse(o => { if (o.userData?.keyword === hit.node) found = true; });
    return found;
  }
  return false;
}

// ── Raycasting (タップ) ──
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();

function getHit(e) {
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  const y = (e.touches ? e.touches[0].clientY : e.clientY);
  pointer.x = (x / innerWidth) *  2 - 1;
  pointer.y = (y / innerHeight) * -2 + 1;
  raycaster.setFromCamera(pointer, camera);

  // sprite (キーワード + BRIEF) を距離順に取る → 手前のものが勝つ
  const sprites = [];
  orreryGroup.traverse(o => {
    if (!o.isSprite) return;
    if (o.userData.keyword) sprites.push(o);
    if (o.userData.isBrief && o.visible) sprites.push(o);
  });
  const sprHits = raycaster.intersectObjects(sprites);
  if (sprHits.length) {
    const top = sprHits[0].object;
    if (top.userData.keyword) return { type: 'keyword', node: top.userData.keyword };
    if (top.userData.isBrief) return { type: 'brief' };
  }

  // sphere (globe 全体)
  const meshes = [];
  globesList.forEach(g => {
    g.children.forEach(c => {
      if (c.isMesh && c.geometry?.type === 'SphereGeometry') meshes.push(c);
    });
  });
  const meshHits = raycaster.intersectObjects(meshes);
  if (meshHits.length) {
    let g = meshHits[0].object;
    while (g.parent && !g.userData.globeData) g = g.parent;
    return { type: 'globe', group: g };
  }
  return null;
}

function showKeywordDetail(keyword) {
  if (!keyword) return;
  document.getElementById('detail-keyword').textContent = keyword.text;
  document.getElementById('detail-meta-top').textContent =
    `${keyword.count} 出現  /  ${keyword.articles.length} 記事`;
  const list = document.getElementById('article-list');
  list.innerHTML = '';
  if (!keyword.articles || !keyword.articles.length) {
    list.innerHTML = '<p style="color:#446677;font-size:14px;">関連記事なし</p>';
  } else {
    keyword.articles.forEach(a => {
      const card = document.createElement('div');
      card.className = 'article-card';
      // ⭐ タイトル自体を元ソースへのリンクに
      let titleEl;
      if (a.url) {
        titleEl = document.createElement('a');
        titleEl.href = a.url; titleEl.target = '_blank'; titleEl.rel = 'noopener';
        titleEl.style.color = 'inherit';
        titleEl.style.textDecoration = 'none';
      } else {
        titleEl = document.createElement('div');
      }
      titleEl.className = 'article-title';
      titleEl.textContent = a.title || '─';
      const summaryEl = document.createElement('div'); summaryEl.className = 'article-summary'; summaryEl.textContent = a.summary || '';
      const metaEl    = document.createElement('div'); metaEl.className    = 'article-meta';
      metaEl.innerHTML = `<span>SOURCE: ${a.source_name || '─'}</span>` +
                         (a.score ? `<span>SCORE: ${a.score}</span>` : '');
      card.appendChild(titleEl);
      if (a.title_orig) {
        const origEl = document.createElement('div');
        origEl.className = 'article-title-orig';
        origEl.textContent = a.title_orig;
        card.appendChild(origEl);
      }
      if (a.summary) card.appendChild(summaryEl);
      card.appendChild(metaEl);
      if (a.url) {
        const linkEl = document.createElement('a');
        linkEl.className = 'article-link';
        linkEl.href = a.url; linkEl.target = '_blank'; linkEl.rel = 'noopener';
        linkEl.textContent = 'OPEN ARTICLE →';
        card.appendChild(linkEl);
      }
      list.appendChild(card);
    });
  }
  document.getElementById('detail-panel').classList.add('active');
}

});

renderer.domElement.addEventListener('pointerdown', e => {
  const hit = getHit(e);
  const main = findMainGlobe();
  pState = {
    startX: e.clientX, startY: e.clientY, startT: Date.now(),
    lastX: e.clientX, lastY: e.clientY,
    initialHit: hit, onMain: isHitOnMain(hit, main),
    mode: 'tap-candidate',
  };
});

renderer.domElement.addEventListener('pointermove', e => {
  if (!pState) return;
  const totalDx = e.clientX - pState.startX;
  const totalDy = e.clientY - pState.startY;
  const dist = Math.sqrt(totalDx*totalDx + totalDy*totalDy);
  if (pState.mode === 'tap-candidate' && dist > 6) {
    pState.mode = pState.onMain ? 'main-rotate' : 'background-swipe';
  }
  const dx = e.clientX - pState.lastX;
  const dy = e.clientY - pState.lastY;
  pState.lastX = e.clientX;
  pState.lastY = e.clientY;
  if (pState.mode === 'main-rotate') {
    const main = findMainGlobe();
    if (main) {
      main.rotation.y += dx * 0.006;
      main.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, main.rotation.x + dy * 0.006));
    }
  }
});

renderer.domElement.addEventListener('pointerup', e => {
  if (!pState) return;
  const totalDx = e.clientX - pState.startX;
  const totalDy = e.clientY - pState.startY;
  const dist = Math.sqrt(totalDx*totalDx + totalDy*totalDy);
  const dt = Date.now() - pState.startT;

  if (pState.mode === 'tap-candidate' && dist <= 10 && dt <= 400) {
    // タップ判定
    const hit = pState.initialHit;
    if (!hit) {
      // 何もない場所をタップ → 開いてるパネルを閉じる
      const briefOpen  = document.getElementById('brief-panel').classList.contains('open');
      const detailOpen = document.getElementById('detail-panel').classList.contains('active');
      if (briefOpen)  setBriefOpen(false);
      if (detailOpen) document.getElementById('detail-panel').classList.remove('active');
    } else if (hit) {
      if (hit.type === 'keyword') {
        showKeywordDetail(hit.node);
      } else if (hit.type === 'brief') {
        setBriefOpen(true);
      } else if (hit.type === 'globe') {
        const i = globesList.indexOf(hit.group);
        if (i >= 0) {
          const N = globesList.length;
          const curSlot = slotAssignment[i];
          if (curSlot !== 0) {
            const ccw = curSlot;
            const cw  = N - curSlot;
            if (cw <= ccw) rotateRevolver(+cw); else rotateRevolver(-ccw);
          }
        }
      }
    }
  } else if (pState.mode === 'background-swipe') {
    // 背景スワイプ → リボルバー
    if (Math.abs(totalDx) > 100 && Math.abs(totalDx) > Math.abs(totalDy) * 1.3) {
      rotateRevolver(totalDx < 0 ? +1 : -1);
    }
  }
  // 'main-rotate' は drag 中で既に rotation 適用済、 何もしない
  pState = null;
});

// ── アニメーションループ ──
let lastT = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = (now - lastT) / 1000;
  lastT = now;
  controls.update();
  updateRevolverAnim(dt);

  // ⭐ FLOW モード: 寿司レーン式 (前=4 球 一列、 後=5 球 小さく下に、 重ならない)
  if (autoFlow && globesList.length && !animating) {
    flowAngle += dt / FLOW_PERIOD_SEC;
    if (flowAngle > 1) flowAngle -= 1;

    const N = globesList.length;
    const W_F = 750;
    const W_B = 900;
    const D   = 1500;
    const Y   = 200;
    const FRONT_FRAC = 0.39;
    const BACK_FRAC  = 0.50;
    const END_FRAC   = 0.055;
    const FRONT_PEAK = 1.10;   // 前列中央の最大 scale
    const BACK_S     = 0.40;

    let bestIdx = 0, bestSq = Infinity;
    globesList.forEach((g, i) => {
      const s = ((i / N) + flowAngle) % 1;
      let x, y, z;
      if (s < FRONT_FRAC) {
        const t = s / FRONT_FRAC;
        x = -W_F + 2 * W_F * t; y = 0; z = 0;
      } else if (s < FRONT_FRAC + END_FRAC) {
        const t = (s - FRONT_FRAC) / END_FRAC;
        x =  W_F + (W_B - W_F) * t; y = -Y * t; z = -D * t;
      } else if (s < FRONT_FRAC + END_FRAC + BACK_FRAC) {
        const t = (s - FRONT_FRAC - END_FRAC) / BACK_FRAC;
        x =  W_B - 2 * W_B * t; y = -Y; z = -D;
      } else {
        const t = (s - FRONT_FRAC - END_FRAC - BACK_FRAC) / END_FRAC;
        x = -W_B + (W_B - W_F) * t; y = -Y * (1 - t); z = -D * (1 - t);
      }
      g.position.set(x, y, z);
      // スケール: 前 line 上は spotlight (中央が PEAK、 両端は小さく → 4 球並んでも重ならない)
      const depthFrac = Math.min(1, Math.max(0, (-z + Math.abs(y)) / (D + Y)));
      const xN = x / W_F;
      const wx = Math.max(0.5, 1 - xN * xN * 0.5);  // 中央 1.0、 両端 0.5
      const frontScale = FRONT_PEAK * wx;
      const scale = BACK_S + (frontScale - BACK_S) * (1 - depthFrac);
      g.scale.setScalar(scale);

      // ⭐ 自転速度: 1/3 化して 流し見ペース (前 0.022 → 後 0.056)
      const rotSpeed = 0.022 + (0.056 - 0.022) * depthFrac;
      g.rotation.y += dt * rotSpeed;

      // ⭐ 観 sprite の alpha も連続補間 (snap 防止)
      const brief = g.userData?.brief;
      if (brief) {
        const data = g.userData?.globeData;
        const hasSummary = !!(data && (data.summary || (data.clusters && data.clusters.length)));
        if (!hasSummary) {
          brief.visible = false;
          brief.userData.flowAlpha = 0;
        } else {
          // 前面 spotlight: x も z もゼロに近いほど濃い
          const proximity = Math.exp(-(xN * xN * 1.5 + depthFrac * depthFrac * 4));
          brief.visible = proximity > 0.04;
          brief.userData.flowAlpha = proximity;
        }
      }

      const sq = x * x + z * z + y * y;
      if (sq < bestSq) { bestSq = sq; bestIdx = i; }
    });
    if (flowMainIdx !== bestIdx) {
      flowMainIdx = bestIdx;
      globesList.forEach((_, i) => { slotAssignment[i] = (i === bestIdx) ? 0 : 1; });
      updateCenterLabel();
    }
  }

  // 自転 (FLOW モードでは上記の loop が処理済、 ここは非 FLOW のみ)
  if (!autoFlow) {
    globesList.forEach((g, i) => {
      const isMain = (slotAssignment[i] === 0);
      g.rotation.y += dt * (isMain ? 0.067 : 0.167);
    });
  }
  // BRIEF core: 呼吸 (scale) + 浮遊 (y) + alpha 揺らぎ
  const tsec = now * 0.001;
  globesList.forEach(g => {
    const b = g.userData?.brief;
    if (!b || !b.visible) return;
    const pulse = 1.0 + Math.sin(tsec * 1.6) * 0.06;
    b.scale.set(58 * pulse, 47 * pulse, 1);
    b.position.y = Math.sin(tsec * 0.7) * 10;
    const baseAlpha = 0.78 + 0.20 * (0.5 + 0.5 * Math.sin(tsec * 1.2));
    // FLOW 時は proximity に基づく flowAlpha を乗じて滑らかに fade
    const flowA = autoFlow ? (b.userData.flowAlpha ?? 1) : 1;
    b.material.opacity = baseAlpha * flowA;
  });
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ─── キーワード抽出 (JA katakana / kanji + EN tokens) ───
const SS_STOP_WORDS = new Set([
  'について','による','として','ている','された','される','など','ため','この','その','また','さらに',
  'ことで','において','に関して','以上','以下','可能','必要','重要','this','that','with','from',
  'have','will','their','there','these','those','about','which','would','could','should','been',
  'were','when','where','what','your','also','more','some','such','only','after','before','through',
]);
function ssExtractKeywords(text) {
  if (!text) return [];
  const out = new Set();
  for (const m of text.matchAll(/[ァ-ヴー]{3,}/g)) out.add(m[0]);
  for (const m of text.matchAll(/[一-鿿]{2,6}/g)) {
    if (!SS_STOP_WORDS.has(m[0])) out.add(m[0]);
  }
  for (const m of text.matchAll(/[A-Za-z][A-Za-z0-9]{3,}/g)) {
    const w = m[0].toLowerCase();
    if (!SS_STOP_WORDS.has(w) && w.length <= 20) out.add(w);
  }
  return [...out];
}

// ─── 球面 spring layout (Python と同じロジックの JS 簡易版) ───
function ssSpringLayout(n, radius) {
  if (n === 0) return [];
  const pts = [];
  for (let i = 0; i < n; i++) {
    const phi   = Math.acos(1 - 2 * (i + 0.5) / n);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    pts.push([
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta),
    ]);
  }
  return pts;
}

// ─── 検索結果から球儀データを構築 ───
function ssBuildGlobeData(id, label, color, articles) {
  if (!articles.length) return null;
  const counter = new Map();
  for (const a of articles) {
    for (const k of ssExtractKeywords(a.title || '')) {
      counter.set(k, (counter.get(k) || 0) + 1);
    }
  }
  const top = [...counter.entries()].sort((a,b) => b[1]-a[1]).slice(0, 60);
  if (!top.length) return null;
  const topSet = new Set(top.map(t => t[0]));
  const wordArticles = new Map();
  for (const a of articles) {
    const kws = ssExtractKeywords(a.title || '').filter(k => topSet.has(k));
    for (const k of kws) {
      if (!wordArticles.has(k)) wordArticles.set(k, []);
      wordArticles.get(k).push(a);
    }
  }
  const positions = ssSpringLayout(top.length, GLOBE_RADIUS);
  const nodes = top.map(([w, count], i) => {
    const arts = wordArticles.get(w) || [];
    // ⭐ source_name に 「JA」 が含まれてなければ海外発 (EN) と判定
    let foreign = 0;
    for (const a of arts) {
      const src = a.source_name || '';
      if (!/\bJA\b/i.test(src)) foreign++;
    }
    const en_ratio = arts.length ? foreign / arts.length : 0;
    return {
      text: w, count,
      articles: arts.slice(0, 8),
      pos: positions[i] || [0, 0, 0],
      en_ratio: +en_ratio.toFixed(2),
      tr_lang_short: 'EN',
    };
  });
  return {
    id, label, color,
    node_count: nodes.length,
    total_articles: articles.length,
    nodes, edges: [],
  };
}

async function ssSearchWikipedia(query, lang) {
  // 両言語 並列取得 (lang は labeling のみで、 両方を試す)
  const targets = (lang === 'ja') ? ['ja', 'en'] : ['en', 'ja'];
  const results = await Promise.all(targets.map(async L => {
    const host = `${L}.wikipedia.org`;
    const url = `https://${host}/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=20&format=json&origin=*`;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const titles = data[1] || [];
      const descs  = data[2] || [];
      const urls   = data[3] || [];
      return titles.map((t, i) => ({
        title: t, summary: descs[i] || '',
        url: urls[i] || `https://${host}/wiki/${encodeURIComponent(t)}`,
        source_name: `Wikipedia ${L.toUpperCase()}`,
      }));
    } catch (e) {
      console.warn(`Wikipedia ${L} search failed`, e);
      return [];
    }
  }));
  return results.flat();
}

    const r = await fetch(url);

      const title = (e.querySelector('title')?.textContent || '').replace(/\s+/g, ' ').trim();

  const sources = [
    { id:'wikipedia',  cat:'reference',  fn:() => ssSearchWikipedia(query, lang) },
    { id:'wiktionary', cat:'reference',  fn:() => ssSearchWiktionary(query, lang) },
    { id:'wikiquote',  cat:'reference',  fn:() => ssSearchWikiquote(query, lang) },
    { id:'wikibooks',  cat:'reference',  fn:() => ssSearchWikibooks(query, lang) },
    { id:'wikinews',   cat:'news',       fn:() => ssSearchWikinews(query) },
    { id:'hn',         cat:'discussion', fn:() => ssSearchHackerNews(query) },
    { id:'stackex',    cat:'discussion', fn:() => ssSearchStackExchange(query) },
    { id:'openalex',   cat:'academia',   fn:() => ssSearchOpenAlex(query) },
    { id:'arxiv',      cat:'academia',   fn:() => ssSearchArXiv(query) },
    { id:'semschol',   cat:'academia',   fn:() => ssSearchSemanticScholar(query) },
    { id:'crossref',   cat:'academia',   fn:() => ssSearchCrossref(query) },
    { id:'dblp',       cat:'academia',   fn:() => ssSearchDBLP(query) },
    { id:'github',     cat:'code',       fn:() => ssSearchGitHub(query) },
    { id:'openlib',    cat:'books',      fn:() => ssSearchOpenLibrary(query) },
    { id:'gutendex',   cat:'books',      fn:() => ssSearchGutendex(query) },
    { id:'met',        cat:'art',        fn:() => ssSearchMetMuseum(query) },
    { id:'ia',         cat:'archive',    fn:() => ssSearchInternetArchive(query) },
  ];
  const categoryDefs = [
    { id:'reference',  label:'REFERENCE',  color:'#00d4ff' },
    { id:'news',       label:'NEWS',       color:'#9be7c4' },
    { id:'discussion', label:'DISCUSSION', color:'#ff851b' },
    { id:'academia',   label:'ACADEMIA',   color:'#b88aff' },
    { id:'code',       label:'CODE',       color:'#ff7eb9' },
    { id:'books',      label:'BOOKS',      color:'#ffb84d' },
    { id:'art',        label:'ART',        color:'#ffd166' },
    { id:'archive',    label:'ARCHIVE',    color:'#a8e6cf' },
  ];
  const TIMEOUT_MS = 7000;
  const withTimeout = (p, ms) =>
    Promise.race([p, new Promise(res => setTimeout(() => res([]), ms))]);

  // ⭐ 各カテゴリの articles 蓄積、 progressive rebuild
  const catArticles = {};
  categoryDefs.forEach(c => { catArticles[c.id] = []; });
  let done = 0;
  let rebuildTimer = null;
  const rebuildGlobesFromCats = () => {
    const newGlobes = [];
    let total = 0;
    for (const cd of categoryDefs) {
      const g = ssBuildGlobeData(cd.id, cd.label, cd.color, catArticles[cd.id]);
      if (g) newGlobes.push(g);
      total += catArticles[cd.id].length;
    }
    // ⭐ カテゴリ集合 (id 列) が前回と完全一致なら in-place 更新のみ (layoutRevolver 不要)
    const oldIds = searchGlobesData.map(g => g.id).join(',');
    const newIds = newGlobes.map(g => g.id).join(',');
    const setsMatch = oldIds === newIds && searchGlobesData.length === newGlobes.length;

    if (setsMatch && currentApp === 'search' && globesList.length === newGlobes.length) {
      // 既存 globe の中身だけ更新 (nodes/edges を mutate して同じ object 参照を保つ)
      newGlobes.forEach((ng, i) => {
        const og = searchGlobesData[i];
        // 翻訳済みフラグはリセットしない (翻訳キャッシュ活用)
        const wasTranslated = og.kwAutoTranslated;
        const oldTextMap = {};
        (og.nodes || []).forEach(n => { if (n.textOrig) oldTextMap[n.textOrig] = n.text; });
        Object.assign(og, ng);
        // 翻訳済みなら新しい nodes にも翻訳結果を適用
        if (wasTranslated && og.nodes) {
          og.nodes.forEach(n => {
            const translated = oldTextMap[n.text];
            if (translated) { n.textOrig = n.text; n.text = translated; }
          });
          og.kwAutoTranslated = wasTranslated;
        }
        // sprite だけ再構築 (globe group / カメラ位置はそのまま)
        ssRefreshGlobeSprites(og);
      });
    } else {
      // ⭐ カテゴリ追加/削除あり: layoutRevolver 経由で再構築 + main 保持
      let prevMainId = null;
      if (currentApp === 'search' && globesList.length && slotAssignment.length) {
        const mainIdx = slotAssignment.findIndex(s => s === 0);
        if (mainIdx >= 0 && globesList[mainIdx]) {
          prevMainId = globesList[mainIdx].userData?.globeData?.id;
        }
      }
      searchGlobesData = newGlobes;
      if (currentApp === 'search') {
        globesData = searchGlobesData;
        layoutRevolver();
        if (prevMainId && globesData.length > 0) {
          const newIdx = globesData.findIndex(g => g.id === prevMainId);
          if (newIdx > 0 && newIdx < globesList.length) {
            const N = globesList.length;
            slotAssignment = globesList.map((_, i) => ((i - newIdx) % N + N) % N);
            globesList.forEach((g, i) => {
              const slot = slots[slotAssignment[i]];
              if (slot) {
                g.position.copy(slot.pos);
                g.scale.setScalar(slot.scale);
              }
            });
            updateCenterLabel();
          }
        }
      }
    }
    document.getElementById('counter').textContent =
      `CATEGORIES: ${newGlobes.length}  /  KEYWORDS: ${newGlobes.reduce((s,g)=>s+g.node_count,0)}  /  HITS: ${total}`;
    return { globes: newGlobes, total };
  };
  const scheduleRebuild = () => {
    if (rebuildTimer) clearTimeout(rebuildTimer);
    // 700ms debounce
    rebuildTimer = setTimeout(() => { rebuildGlobesFromCats(); rebuildTimer = null; }, 700);
  };

  status.textContent = `0 / ${sources.length} ソース...`;

  // ⭐ 各ソースを並列で投げて、 完了ごとに progressive 描画
  const perSourceCounts = {};
  await Promise.all(sources.map(async s => {
    try {
      const articles = await withTimeout(s.fn(), TIMEOUT_MS);
      perSourceCounts[s.id] = articles.length;
      catArticles[s.cat].push(...articles);
      done++;
      status.textContent = `${done} / ${sources.length} ソース (${articles.length} hits from ${s.id})`;
      scheduleRebuild();
    } catch (e) {
      done++;
      perSourceCounts[s.id] = 0;
      console.warn(`[${s.id}] failed`, e);
      status.textContent = `${done} / ${sources.length} ソース (${s.id} ✗)`;
    }
  }));

  // 最終 rebuild
  if (rebuildTimer) clearTimeout(rebuildTimer);
  const { globes, total } = rebuildGlobesFromCats();
  console.log('[Search] hits per source:', perSourceCounts);
  const breakdown = categoryDefs
    .filter(cd => catArticles[cd.id].length > 0)
    .map(cd => `${cd.label}:${catArticles[cd.id].length}`)
    .join(' / ');
  status.textContent = globes.length
    ? `✓ ${globes.length} カテゴリ / ${total} hits (${breakdown})`
    : '⚠ 全ソース 0 件 (console 参照)';
  btn.disabled = false;
  // ⭐ 検索完了後、 sphere 上のキーワードを MyMemory で順次 JA 化
  // (バックグラウンド、 ユーザーの操作を妨げない)
  ssAutoTranslateAllSearchGlobes().catch(e => console.warn('auto-translate batch failed', e));
}
