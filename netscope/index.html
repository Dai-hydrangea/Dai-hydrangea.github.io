// ════════════════════════════════════════════════════════════════════
//   ⭐ 翻訳エンジン (MyMemory + Gemini BYOK)、 観 ボタン押したときだけ起動
//   キャッシュは NITS と共有 (同一 origin の localStorage)
// ════════════════════════════════════════════════════════════════════
const SS_TR_CACHE_KEY    = 'nits_tr_cache_v1';
const SS_STORAGE_GEMINI  = 'nits_gemini_key_v1';   // NITS と完全共有
const SS_STORAGE_ENGINE  = 'ss_search_engine_v1';  // 'native' | 'mymemory' | 'gemini'
const SS_GEMINI_MODEL    = 'gemini-2.5-flash';
const SS_GEMINI_URL      = `https://generativelanguage.googleapis.com/v1beta/models/${SS_GEMINI_MODEL}:generateContent`;

// ⭐ Chrome の端末内翻訳 (Translator API, Gemini Nano) が使えるか
const ssHasNative = (typeof self !== 'undefined') && ('Translator' in self);

function ssLoadGeminiKey() { return localStorage.getItem(SS_STORAGE_GEMINI) || ''; }
function ssSaveGeminiKey(k) {
  if (k) localStorage.setItem(SS_STORAGE_GEMINI, k);
  else   localStorage.removeItem(SS_STORAGE_GEMINI);
}
function ssLoadEngine() {
  const v = localStorage.getItem(SS_STORAGE_ENGINE);
  // 既定: Native > Gemini > MyMemory
  if (!v) {
    if (ssHasNative) return 'native';
    if (ssLoadGeminiKey()) return 'gemini';
    return 'mymemory';
  }
  if (v === 'native' && !ssHasNative) return ssLoadGeminiKey() ? 'gemini' : 'mymemory';
  return (v === 'native' || v === 'gemini' || v === 'mymemory') ? v : 'mymemory';
}
function ssSaveEngine(e) { localStorage.setItem(SS_STORAGE_ENGINE, e); }
function ssLoadTrCache() {
  try { return JSON.parse(localStorage.getItem(SS_TR_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function ssSaveTrCache(c) {
  const entries = Object.entries(c);
  if (entries.length > 3000) c = Object.fromEntries(entries.slice(-2500));
  try { localStorage.setItem(SS_TR_CACHE_KEY, JSON.stringify(c)); } catch {}
}
function ssTrKey(text) {
  let h = 0;
  for (let i = 0; i < text.length; i++) h = ((h*31) + text.charCodeAt(i)) | 0;
  return h.toString(36);
}
function ssDetectStringLang(text) {
  if (!text) return 'en';
  if (/[ぁ-ゟ゠-ヿ]/.test(text)) return 'ja';
  if (/[一-鿿]/.test(text)) return 'zh';
  return 'en';
}
// ⭐ MyMemory daily limit (1000 words/IP/day) を検出して以降スキップ
let ssMyMemoryLimitHit = false;
async function ssMyMemoryOne(text, sourceLang, targetLang) {
  if (ssMyMemoryLimitHit) return text;
  const pair = `${sourceLang}|${targetLang}`;
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`;
  // ⭐ 5秒 タイムアウト (ハング防止)
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 5000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    const d = await r.json();
    if (d?.responseStatus === 200 && d?.responseData?.translatedText) {
      const t = String(d.responseData.translatedText);
      // MyMemory が API キー未認証で 「Mymemory」 などを返した場合は失敗扱い
      if (/MYMEMORY WARNING|QUOTA EXCEEDED|USED ALL/i.test(t)) {
        console.warn('[MyMemory] quota warning in text:', t);
        return text;
      }
      return t;
    }
    const details = String(d?.responseDetails || '');
    if (/DAILY LIMIT|USED ALL AVAILABLE|QUOTA/i.test(details)) {
      ssMyMemoryLimitHit = true;
      console.warn('[MyMemory] ⚠️ 1000 words/日 上限到達:', details);
      const status = document.getElementById('search-status');
      if (status) status.textContent = '⚠ MyMemory 1日上限到達 (明日復活)';
    } else {
      console.warn(`[MyMemory] "${text.slice(0,40)}" failed: status=${d?.responseStatus}, ${details.slice(0,80)}`);
    }
  } catch (e) {
    clearTimeout(timer);
    console.warn(`[MyMemory] "${text.slice(0,40)}" exception:`, e.message || e);
  }
  return text;
}

// ⭐ Gemini BYOK batch 翻訳 (圧縮プロンプト + retry + timeout)
async function ssGeminiCall(prompt, apiKey, { retries = 2, timeoutMs = 20000 } = {}) {
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { temperature: 0.2, responseMimeType: 'application/json' },
  };
  const data = JSON.stringify(body);
  for (let attempt = 0; attempt < retries; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const r = await fetch(`${SS_GEMINI_URL}?key=${encodeURIComponent(apiKey)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: data, signal: ctrl.signal,
      });
      if (r.status === 429 || r.status === 503) {
        if (attempt + 1 < retries) {
          await new Promise(res => setTimeout(res, (2 ** attempt) * 800));
          continue;
        }
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const payload = await r.json();
      const text = payload?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('empty response');
      return JSON.parse(text);
    } catch (e) {
      if (attempt + 1 >= retries) throw e;
      await new Promise(res => setTimeout(res, 400));
    } finally {
      clearTimeout(timer);
    }
  }
}

// ⭐ Gemini batch (1 request で 50 件まで、 プロンプト最小化)
// ⭐ Chrome 端末内翻訳 (Translator API, Gemini Nano) ─────────
// 言語ペアごとに translator インスタンスをキャッシュ。 初回はモデルダウンロードあり
const ssNativeTranslators = {};  // "src|dst" → translator | false (失敗)
async function ssGetNativeTranslator(srcLang, dstLang) {
  if (!ssHasNative) return null;
  const key = `${srcLang}|${dstLang}`;
  if (ssNativeTranslators[key] === false) return null;
  if (ssNativeTranslators[key]) return ssNativeTranslators[key];
  try {
    const av = await self.Translator.availability({ sourceLanguage: srcLang, targetLanguage: dstLang });
    if (av === 'unavailable') {
      console.warn(`[Native] ${key} unavailable`);
      ssNativeTranslators[key] = false;
      return null;
    }
    const status = document.getElementById('search-status');
    if ((av === 'downloadable' || av === 'downloading') && status) {
      status.textContent = `モデル DL中 (${key})...`;
    }
    const t = await self.Translator.create({
      sourceLanguage: srcLang,
      targetLanguage: dstLang,
      monitor(m) {
        m.addEventListener('downloadprogress', e => {
          const pct = Math.round((e.loaded || 0) * 100);
          if (status) status.textContent = `モデル DL ${key}: ${pct}%`;
          console.log(`[Native] DL ${key}: ${pct}%`);
        });
      },
    });
    ssNativeTranslators[key] = t;
    console.log(`[Native] ${key} ready`);
    return t;
  } catch (e) {
    console.warn(`[Native] ${key} create failed:`, e.message || e);
    ssNativeTranslators[key] = false;
    return null;
  }
}

async function ssGeminiBatch(texts, targetLang, apiKey) {
  const lang = (targetLang === 'ja') ? 'ja' : 'en';
  // プロンプト超圧縮: 命令 ~12 token
  const prompt = `→${lang}, preserve proper nouns, JSON array same order:\n${JSON.stringify(texts)}`;
  const result = await ssGeminiCall(prompt, apiKey);
  if (!Array.isArray(result) || result.length !== texts.length) {
    throw new Error('length mismatch');
  }
  return result.map(s => String(s));
}
// ⭐ 並列翻訳 (engine routing + キャッシュ + dedup)
// opts.engine: 'mymemory' | 'gemini' で強制 (省略時 localStorage の設定)
async function ssTranslateBatch(texts, targetLang, opts = {}) {
  const cache = ssLoadTrCache();
  const out = new Array(texts.length);
  const engine = opts.engine || ssLoadEngine();
  const apiKey = ssLoadGeminiKey();
  const useNative = (engine === 'native') && ssHasNative;
  const useGemini = (engine === 'gemini') && apiKey;

  // ⭐ 圧縮 1: キャッシュヒット & 既に target lang を除外
  // ⭐ 圧縮 2: 重複テキストを 1 回しか翻訳しない (dedup map)
  const dedupMap = new Map();  // text → indices[]
  texts.forEach((t, i) => {
    const src = ssDetectStringLang(t);
    if (src === targetLang) { out[i] = t; return; }
    const k = ssTrKey(t);
    if (cache[k] && cache[k][targetLang]) { out[i] = cache[k][targetLang]; return; }
    if (!dedupMap.has(t)) dedupMap.set(t, { src, k, indices: [] });
    dedupMap.get(t).indices.push(i);
  });
  const toFetch = [...dedupMap.entries()].map(([text, info]) => ({ text, ...info }));
  if (toFetch.length === 0) return out;

  if (useNative) {
    // ⭐ Chrome 端末内翻訳: 言語ペア毎に group 化、 ペア内は並列 (CONC=4)
    const bySrc = new Map();
    for (const c of toFetch) {
      if (!bySrc.has(c.src)) bySrc.set(c.src, []);
      bySrc.get(c.src).push(c);
    }
    for (const [src, group] of bySrc.entries()) {
      const tr = await ssGetNativeTranslator(src, targetLang);
      if (!tr) {
        // この source は native 不可 → MyMemory に逃がす
        for (const c of group) {
          const trans = await ssMyMemoryOne(c.text, c.src, targetLang);
          if (trans && trans !== c.text) {
            for (const i of c.indices) out[i] = trans;
            cache[c.k] = cache[c.k] || {};
            cache[c.k][targetLang] = trans;
          } else {
            for (const i of c.indices) out[i] = c.text;
          }
        }
        continue;
      }
      let nIdx = 0;
      const NCONC = 4;
      await Promise.all(Array.from({ length: NCONC }, async () => {
        while (true) {
          const j = nIdx++;
          if (j >= group.length) return;
          const c = group[j];
          try {
            const trans = await tr.translate(c.text);
            if (trans && trans !== c.text) {
              for (const i of c.indices) out[i] = trans;
              cache[c.k] = cache[c.k] || {};
              cache[c.k][targetLang] = trans;
            } else {
              for (const i of c.indices) out[i] = c.text;
            }
          } catch (e) {
            console.warn(`[Native] translate failed "${c.text.slice(0,30)}":`, e.message || e);
            for (const i of c.indices) out[i] = c.text;
          }
        }
      }));
    }
  } else if (useGemini) {
    // ⭐ Gemini: 50 件 batch、 2 並列
    const BATCH_SIZE = 50;
    const CONCURRENT = 2;
    const batches = [];
    for (let i = 0; i < toFetch.length; i += BATCH_SIZE) {
      batches.push(toFetch.slice(i, i + BATCH_SIZE));
    }
    let bi = 0;
    const worker = async () => {
      while (true) {
        const j = bi++;
        if (j >= batches.length) return;
        const chunk = batches[j];
        try {
          const translated = await ssGeminiBatch(chunk.map(c => c.text), targetLang, apiKey);
          chunk.forEach((c, k) => {
            const trans = translated[k];
            if (trans && trans !== c.text) {
              for (const idx of c.indices) out[idx] = trans;
              cache[c.k] = cache[c.k] || {};
              cache[c.k][targetLang] = trans;
            } else {
              for (const idx of c.indices) out[idx] = c.text;
            }
          });
        } catch (e) {
          console.warn('gemini batch failed, falling back to MyMemory', e);
          // この batch だけ MyMemory にフォールバック
          for (const c of chunk) {
            const trans = await ssMyMemoryOne(c.text, c.src, targetLang);
            for (const idx of c.indices) out[idx] = trans || c.text;
            cache[c.k] = cache[c.k] || {};
            cache[c.k][targetLang] = trans || c.text;
          }
        }
      }
    };
    await Promise.all(Array.from({ length: CONCURRENT }, worker));
  } else {
    // MyMemory: 1 件 ずつ、 3 並列
    let idx = 0;
    const CONC = 3;
    await Promise.all(Array.from({ length: CONC }, async () => {
      while (true) {
        const j = idx++;
        if (j >= toFetch.length) return;
        const c = toFetch[j];
        const trans = await ssMyMemoryOne(c.text, c.src, targetLang);
        // ⭐ 翻訳成功時のみキャッシュ (失敗 = trans === c.text なら キャッシュせず 次回再試行)
        if (trans && trans !== c.text) {
          for (const i of c.indices) out[i] = trans;
          cache[c.k] = cache[c.k] || {};
          cache[c.k][targetLang] = trans;
        } else {
          for (const i of c.indices) out[i] = c.text;
        }
      }
    }));
  }
  ssSaveTrCache(cache);
  return out;
}

// ⭐ Gemini で 要約 + クラスタ 生成 (NEWS の SCAN 機能を SEARCH に持ってくる)
async function ssSummarizeGlobeGemini(globe, apiKey, targetLang = 'ja') {
  const langName = targetLang === 'ja' ? '日本語' : 'English';
  const keywords = globe.nodes.slice(0, 20).map(n => n.text);
  const seen = new Set();
  const titles = [];
  for (const n of globe.nodes.slice(0, 12)) {
    for (const a of n.articles || []) {
      if (a.title && !seen.has(a.title)) { seen.add(a.title); titles.push(a.title); }
      if (titles.length >= 12) break;
    }
    if (titles.length >= 12) break;
  }
  if (!keywords.length || !titles.length) return null;
  const prompt =
    `Cat: ${globe.label}, Query: "${searchActiveQuery}", Lang: ${langName}\n` +
    `JSON: {"summary":"3-5行(各50-70字), 検索結果の概観 (具体的な対象/出来事)","clusters":[{"name":"<=15字","keywords":["入力KWのみ"]}](3-6個)}\n` +
    `KW: ${JSON.stringify(keywords)}\n` +
    `T: ${JSON.stringify(titles)}`;
  try {
    const r = await ssGeminiCall(prompt, apiKey);
    if (!r || typeof r !== 'object') return null;
    const kwSet = new Set(keywords);
    const summary = (r.summary || '').trim();
    const clusters = Array.isArray(r.clusters) ? r.clusters
      .filter(c => c && c.name && Array.isArray(c.keywords))
      .map(c => ({ name: String(c.name).trim(), keywords: c.keywords.filter(k => kwSet.has(k)) }))
      .filter(c => c.name && c.keywords.length)
      : [];
    if (!summary && !clusters.length) return null;
    return { summary, clusters };
  } catch (e) {
    console.warn('summarize failed', e);
    return null;
  }
}

// 球儀の keywords + 上位記事タイトルを翻訳 + (Gemini 時) 要約
async function ssTranslateGlobe(globe, targetLang = 'ja') {
  if (globe.searchTranslation && globe.searchTranslation.lang === targetLang) return globe.searchTranslation;
  const status = document.getElementById('search-status');
  if (status) status.textContent = `翻訳中: ${globe.label}...`;
  const topKw = globe.nodes.slice(0, 30).map(n => n.text);
  const seen = new Set();
  const topArticles = [];
  for (const n of globe.nodes.slice(0, 12)) {
    for (const a of n.articles || []) {
      if (!seen.has(a.title)) { seen.add(a.title); topArticles.push(a); }
      if (topArticles.length >= 12) break;
    }
    if (topArticles.length >= 12) break;
  }
  const kwTranslated    = await ssTranslateBatch(topKw, targetLang);
  const titleTranslated = await ssTranslateBatch(topArticles.map(a => a.title), targetLang);
  globe.searchTranslation = {
    lang: targetLang,
    keywords: topKw.map((orig, i) => ({ orig, ja: kwTranslated[i] })),
    articles: topArticles.map((a, i) => ({
      orig: a.title, ja: titleTranslated[i],
      url: a.url, source_name: a.source_name,
    })),
    summary: '',
    clusters: [],
  };
  // ⭐ Gemini engine 限定: 要約 + クラスタも生成
  const apiKey = ssLoadGeminiKey();
  if (ssLoadEngine() === 'gemini' && apiKey) {
    if (status) status.textContent = `要約生成中: ${globe.label}...`;
    const sum = await ssSummarizeGlobeGemini(globe, apiKey, targetLang);
    if (sum) {
      globe.searchTranslation.summary  = sum.summary;
      globe.searchTranslation.clusters = sum.clusters;
    }
  }
  if (status) status.textContent = '';
  return globe.searchTranslation;
}

// search globe では 観 sprite を完全に非表示 (SearchScope は sphere そのものを翻訳して観察)
const _origUpdateBrief = updateBrief;
updateBrief = function(g) {
  if (currentApp !== 'search') {
    _origUpdateBrief.call(this, g);
    return;
  }
  // ── SearchScope: 観 / BRIEF パネル機能を撤去、 sphere 翻訳でカバー ──
  globesList.forEach(grp => {
    if (grp.userData.brief) grp.userData.brief.visible = false;
  });
  // BRIEF パネルが開いていれば閉じる
  document.getElementById('brief-panel').classList.remove('open');
  return;
};

// 旧: 翻訳結果を BRIEF panel に描画していたコード (dead code、 互換性保持)
function ssRenderSearchBriefDeprecated(g) {
  const summaryEl  = document.getElementById('brief-summary');
  const clustersEl = document.getElementById('brief-clusters');
  const titleEl    = document.getElementById('brief-panel-title');
  const panel      = document.getElementById('brief-panel');

  const applySwap = () => {
    const tr = g.searchTranslation;
    const hasSummary  = tr && tr.summary;
    const hasClusters = tr && tr.clusters && tr.clusters.length;
    // タイトル: 要約あれば SCAN、 翻訳のみなら TRANSLATE
    if (titleEl) titleEl.textContent = `${g.label || '─'} ─ 観 / ${hasSummary ? 'SCAN' : 'TRANSLATE'}`;
    if (!tr) {
      const engine = ssLoadEngine();
      const engineDesc = (engine === 'gemini' && ssLoadGeminiKey())
        ? 'Gemini が翻訳 + 要約 + クラスタ生成します (キャッシュあり、 ¥0 推奨)。'
        : 'MyMemory が翻訳します (キー不要、 1000 words/日)。 Gemini にすると 要約 + クラスタも生成。';
      summaryEl.innerHTML = `<span style="color:#5a7c92;font-style:italic;line-height:1.7;">
        観 をタップで実行。 ${engineDesc}</span>`;
      summaryEl.style.display = 'block';
      clustersEl.innerHTML = '';
      return;
    }
    // 翻訳済 → 表示
    let html = '';
    // ① 要約 (Gemini 時のみ)
    if (hasSummary) {
      html += `<div style="margin-bottom:14px; padding:12px 14px; background:rgba(0,229,255,0.06); border-left:3px solid #00e5ff;">
        <b style="color:#00e5ff; font-size:12px; letter-spacing:2px;">▼ DAILY SCAN</b>
        <div style="white-space:pre-wrap; line-height:1.85; color:#dceaf3; margin-top:8px; font-size:14px;">${tr.summary}</div>
      </div>`;
    }
    // ② キーワード一覧
    html += '<div style="margin-bottom:14px;"><b style="color:#ffd166; font-size:12px; letter-spacing:2px;">▼ 主要キーワード (JA)</b><br>';
    html += tr.keywords.slice(0, 20).map(k =>
      `<span style="display:inline-block;margin:3px 6px 3px 0;color:#dceaf3;">${k.ja}<span style="color:#5a7c92;font-size:11px;"> (${k.orig})</span></span>`
    ).join('');
    html += '</div>';
    // ③ 上位記事
    html += '<div style="margin-bottom:14px;"><b style="color:#ffd166; font-size:12px; letter-spacing:2px;">▼ 上位記事 (JA タイトル)</b>';
    html += tr.articles.map(a => {
      const linkStart = a.url ? `<a href="${a.url}" target="_blank" rel="noopener" style="color:#cfe7f5;text-decoration:none;">` : '<span>';
      const linkEnd   = a.url ? '</a>' : '</span>';
      return `<div style="margin:8px 0;padding:6px 10px;background:rgba(0,30,50,0.4);border-left:2px solid #00415a;">
        ${linkStart}${a.ja}${linkEnd}
        <div style="color:#5a7c92;font-size:11px;font-style:italic;margin-top:2px;">${a.orig}</div>
      </div>`;
    }).join('');
    html += '</div>';
    summaryEl.innerHTML = html;
    summaryEl.style.display = 'block';
    // ④ クラスタピル (Gemini 時のみ)
    clustersEl.innerHTML = '';
    if (hasClusters) {
      const kwCount = {};
      (g.nodes || []).forEach(n => { kwCount[n.text] = n.count || 0; });
      tr.clusters.forEach(c => {
        const total = (c.keywords || []).reduce((s, k) => s + (kwCount[k] || 0), 0);
        const pill = document.createElement('span');
        pill.className = 'cluster-pill';
        pill.innerHTML = `${c.name}<span class="cluster-count">${total}</span>`;
        pill.addEventListener('click', () => focusCluster(c, g));
        clustersEl.appendChild(pill);
      });
    }
  };
  // crossfade ロジックは既存 updateBrief と同じ
  const isOpen = panel.classList.contains('open');
  const idChanged = lastBriefGlobeId !== null && lastBriefGlobeId !== g.id;
  lastBriefGlobeId = g.id;
  if (isOpen && idChanged) {
    if (briefFadeTimer) clearTimeout(briefFadeTimer);
    panel.classList.remove('open');
    briefFadeTimer = setTimeout(() => {
      applySwap();
      setTimeout(() => { panel.classList.add('open'); briefFadeTimer = null; }, 120);
    }, 720);
  } else {
    if (briefFadeTimer) { clearTimeout(briefFadeTimer); briefFadeTimer = null; }
    applySwap();
  }
};

// SearchScope では 観 を撤去したので setBriefOpen のラッピングは無効化
// (NEWS 側の挙動は orig のまま、 search では brief sprite 非表示なのでタップ不可)

// ⭐ Sphere 上のキーワード sprite を node.text の最新値で再構築 (in-place 翻訳反映)
function ssRefreshGlobeSprites(globeData) {
  if (!globesData || !globesList || !globeData) return;
  const idx = globesData.indexOf(globeData);
  if (idx < 0) return;
  const group = globesList[idx];
  if (!group) return;
  // 既存の keyword sprite を dispose
  const toRemove = [];
  group.traverse(o => { if (o.isSprite && o.userData?.keyword) toRemove.push(o); });
  for (const s of toRemove) {
    if (s.material?.map) s.material.map.dispose();
    if (s.material) s.material.dispose();
    group.remove(s);
  }
  // node.text (翻訳後) で再生成
  const colorHex = parseInt(globeData.color.replace('#', ''), 16);
  const maxC = globeData.nodes[0]?.count || 1;
  const minC = globeData.nodes[globeData.nodes.length - 1]?.count || 1;
  const range = Math.max(1, maxC - minC);
  globeData.nodes.forEach(node => {
    const r = Math.pow((node.count - minC) / range, 0.7);
    const fs = 18 + r * 38;
    const sprite = makeKeywordSprite(node, fs, r, colorHex);
    sprite.position.set(node.pos[0], node.pos[1], node.pos[2]);
    sprite.userData = { keyword: node, globeId: globeData.id };
    group.add(sprite);
  });
}

// ⭐ Sphere keyword 自動翻訳 (MyMemory 優先 → 失敗時 Gemini フォールバック)
async function ssAutoTranslateSphereKeywords(globe, targetLang = 'ja') {
  if (globe.kwAutoTranslated === targetLang) return { changed: 0, total: 0, engine: 'cached' };
  const TOP_N = 25;
  const topNodes = globe.nodes.slice(0, TOP_N);
  const texts = topNodes.map(n => n.text);
  const countChanged = (translated) => {
    let c = 0;
    for (let i = 0; i < texts.length; i++) {
      if (translated[i] && translated[i] !== texts[i]) c++;
    }
    return c;
  };
  const apiKey = ssLoadGeminiKey();
  const needCount = texts.filter(t => ssDetectStringLang(t) !== targetLang).length;
  let translated, engineUsed;
  // ⭐ 優先順位: Chrome 端末内 (無料・無制限) > Gemini BYOK > MyMemory
  if (ssHasNative) {
    translated = await ssTranslateBatch(texts, targetLang, { engine: 'native' });
    engineUsed = 'native';
  } else if (apiKey) {
    translated = await ssTranslateBatch(texts, targetLang, { engine: 'gemini' });
    engineUsed = 'gemini';
  } else {
    translated = await ssTranslateBatch(texts, targetLang, { engine: 'mymemory' });
    engineUsed = 'mymemory';
  }
  let changed = countChanged(translated);
  topNodes.forEach((n, i) => {
    const t = translated[i];
    if (t && t !== n.text) {
      n.textOrig = n.text;
      n.text = t;
    }
  });
  globe.kwAutoTranslated = targetLang;
  console.log(`[Translate] ${globe.label}: ${changed}/${needCount} translated via ${engineUsed}`);
  if (currentApp === 'search') ssRefreshGlobeSprites(globe);
  return { changed, total: needCount, engine: engineUsed };
}

// 球儀リストを 主役 から順次翻訳 (status で進捗表示)
async function ssAutoTranslateAllSearchGlobes() {
  if (currentApp !== 'search') return;
  const status = document.getElementById('search-status');
  const globes = searchGlobesData.slice();
  if (!globes.length) return;
  // 主役 (slot 0) を最初に
  if (globesList.length) {
    const mainGlobeIdx = globesList.findIndex((_, i) => slotAssignment[i] === 0);
    if (mainGlobeIdx >= 0 && mainGlobeIdx < globes.length) {
      const main = globes.splice(mainGlobeIdx, 1)[0];
      globes.unshift(main);
    }
  }
  let okGlobes = 0, totalChanged = 0, totalNeed = 0;
  for (let i = 0; i < globes.length; i++) {
    if (currentApp !== 'search') return;  // ユーザーが NEWS に切替えたら停止
    const g = globes[i];
    if (status) status.textContent = `球儀翻訳中: ${g.label} (${i + 1}/${globes.length})`;
    try {
      const result = await ssAutoTranslateSphereKeywords(g, 'ja');
      if (result) {
        if (result.changed > 0) okGlobes++;
        totalChanged += result.changed;
        totalNeed += result.total;
      }
    } catch (e) {
      console.warn(`auto-translate failed for ${g.label}`, e);
    }
  }
  if (status && status.textContent.startsWith('球儀翻訳中')) {
    if (totalNeed === 0) {
      status.textContent = `✓ ${globes.length} カテゴリ (翻訳対象なし、 既に日本語)`;
    } else if (totalChanged === 0) {
      status.textContent = `⚠ 翻訳 0/${totalNeed} 語 (engine 失敗、 console 参照)`;
    } else {
      status.textContent = `✓ 翻訳: ${totalChanged}/${totalNeed} 語 (${okGlobes}/${globes.length} カテゴリ)`;
    }
  }
}

// ⭐ AI 設定 UI のワイヤリング
(function setupSsAiSettings() {
  const tog  = document.getElementById('search-ai-toggle');
  const pane = document.getElementById('search-ai-settings');
  const sel  = document.getElementById('search-engine');
  const inp  = document.getElementById('search-gemini-key');
  const save = document.getElementById('search-ai-save');
  const clr  = document.getElementById('search-ai-clear');
  // Native 非対応ブラウザ では native option を無効化
  const nativeOpt = sel.querySelector('option[value="native"]');
  if (nativeOpt && !ssHasNative) {
    nativeOpt.disabled = true;
    nativeOpt.textContent = '端末内翻訳 (このブラウザでは未対応 ─ Chrome 138+ で利用可)';
  } else if (nativeOpt && ssHasNative) {
    nativeOpt.textContent = '端末内 (Chrome) ✓ 無料・無制限・オフライン';
  }
  function refreshFields() {
    sel.value = ssLoadEngine();
    inp.value = ssLoadGeminiKey();
    tog.classList.toggle('active', sel.value !== 'mymemory');
  }
  refreshFields();
  tog.addEventListener('click', () => {
    pane.classList.toggle('active');
    if (pane.classList.contains('active')) refreshFields();
  });
  save.addEventListener('click', () => {
    const eng = sel.value;
    const key = inp.value.trim();
    if (eng === 'gemini' && !key) {
      alert('Gemini を選んだ場合は API キーが必要です。');
      return;
    }
    if (key) ssSaveGeminiKey(key);
    ssSaveEngine(eng);
    refreshFields();
    pane.classList.remove('active');
    const engLabel = eng === 'native' ? '端末内 (Chrome)' : eng === 'gemini' ? 'Gemini' : 'MyMemory';
    document.getElementById('search-status').textContent = `エンジン: ${engLabel} 保存`;
    setTimeout(() => {
      const s = document.getElementById('search-status');
      if (s.textContent.startsWith('エンジン')) s.textContent = '';
    }, 2500);
  });
  clr.addEventListener('click', () => {
    if (!confirm('Gemini API キーを削除しますか？')) return;
    ssSaveGeminiKey('');
    // Native 使えるなら native、 だめなら mymemory
    ssSaveEngine(ssHasNative ? 'native' : 'mymemory');
    refreshFields();
    document.getElementById('search-status').textContent = 'キー削除済';
    setTimeout(() => {
      const s = document.getElementById('search-status');
      if (s.textContent === 'キー削除済') s.textContent = '';
    }, 2500);
  });
})();
